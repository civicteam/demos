<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <text x="50%" y="50" dominant-baseline="middle" text-anchor="middle"
        font-family="Comic Sans MS, Chalkboard SE, sans-serif"
        font-size="48" font-weight="bold" fill="#cc0000"
        stroke="#000" stroke-width="2">
    ACME
  </text>

  <!-- Dynamite sticks -->
  <g transform="translate(220,70)">
    <rect x="0" y="0" width="10" height="30" rx="2" fill="#ff3333" stroke="#000" stroke-width="1"/>
    <rect x="12" y="0" width="10" height="30" rx="2" fill="#ff3333" stroke="#000" stroke-width="1"/>
    <rect x="6" y="-5" width="10" height="30" rx="2" fill="#ff3333" stroke="#000" stroke-width="1"/>

    <!-- Fuses -->
    <path d="M8,-5 C8,-10 5,-15 0,-18" stroke="#000" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="-18" r="2" fill="orange"/>
  </g>

  <!-- Trigger box -->
  <g transform="translate(40,80)">
    <rect x="0" y="0" width="30" height="20" fill="#8b4513" stroke="#000" stroke-width="1"/>
    <rect x="13" y="-10" width="4" height="10" fill="#000"/>
    <line x1="15" y1="-10" x2="15" y2="-20" stroke="#000" stroke-width="2"/>
  </g>
</svg>
